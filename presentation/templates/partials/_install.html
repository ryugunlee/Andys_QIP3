{# 앱 설치 버튼. 설치 가능한 환경에서만 static/install.js가 hidden을 벗긴다. #}
<div class="install-cta" hidden>
  <button type="button" class="install-button" aria-expanded="false" aria-controls="install-guide">
    앱 설치
  </button>
  <div class="install-guide" id="install-guide" role="dialog" aria-label="앱 설치 안내" hidden>
    <p class="install-guide-title">홈 화면에 추가하기</p>
    <ol class="install-guide-steps">
      <li>아래쪽 <strong>공유</strong> 버튼을 누릅니다.</li>
      <li>목록에서 <strong>홈 화면에 추가</strong>를 고릅니다.</li>
      <li>오른쪽 위 <strong>추가</strong>를 누르면 끝납니다.</li>
    </ol>
    <button type="button" class="install-guide-close">닫기</button>
  </div>
</div>
