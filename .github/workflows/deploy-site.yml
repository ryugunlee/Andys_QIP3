name: Deploy Site

# docs/ 정적 사이트를 재생성·커밋·배포한다. 데이터 수집과 독립적으로 동작하므로,
# presentation 코드(막대그래프 등 표현 계층)만 바꿔도 데이터 재수집 없이 사이트를 갱신할 수 있다.
# 수집 워크플로(collect-*.yml)는 수집 직후 같은 build_and_commit_site 스텝을 실행하며,
# 이 워크플로는 그와 별개로 표현 계층 변경분을 배포하는 통로다.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    # docs/**는 감시하지 않는다 — build_and_commit_site.sh가 docs/만 커밋하므로,
    # docs 변경을 트리거에 넣으면 이 워크플로가 자기 자신을 무한히 재실행하게 된다.
    paths:
      - "presentation/**"
      - "build_site.py"

concurrency:
  group: deploy-site
  cancel-in-progress: false

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # build_site.py가 KR·US 두 주식 DB를 읽으므로 전체 DuckDB를 복원한다(기본 패턴 *.duckdb).
      - name: Restore DuckDB from data-store release
        run: bash .github/scripts/restore_db.sh

      - name: Rebuild site and commit
        run: bash .github/scripts/build_and_commit_site.sh
