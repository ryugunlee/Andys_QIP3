name: Collect NYSE

on:
  schedule:
    # 매주 목요일 23:00 UTC (미국 동부 여름/겨울 시간 모두에서 종가 이후)
    - cron: "0 23 * * 4"
  workflow_dispatch: {}

concurrency:
  group: collect-nyse
  cancel-in-progress: false

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore DuckDB from data-store release
        run: bash .github/scripts/restore_db.sh

      - name: Collect NYSE data
        run: python Andys_QIP2.py NYSE

      - name: Save DuckDB to data-store release
        run: bash .github/scripts/save_db.sh

      - name: Rebuild site and commit
        run: bash .github/scripts/build_and_commit_site.sh
